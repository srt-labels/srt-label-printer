<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRI RADHE — Label Printer</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d0d0d;
    --paper: #f5f0e8;
    --saffron: #FF6B00;
    --saffron-dark: #cc5500;
    --green: #1a7a4a;
    --green-light: #e8f5ee;
    --red: #c0392b;
    --red-light: #fdecea;
    --border: #0d0d0d;
    --card: #ffffff;
    --muted: #666;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* Diagonal stripe background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 40px,
      rgba(255,107,0,0.04) 40px,
      rgba(255,107,0,0.04) 41px
    );
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  /* Header */
  header {
    border: 3px solid var(--border);
    background: var(--saffron);
    padding: 1.5rem 2rem;
    margin-bottom: 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .brand { display: flex; flex-direction: column; }
  .brand-name {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2rem;
    color: #fff;
    letter-spacing: 1px;
    line-height: 1;
    text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
  }
  .brand-sub { font-size: 0.78rem; color: rgba(255,255,255,0.85); font-weight: 500; letter-spacing: 3px; text-transform: uppercase; margin-top: 4px; }

  .printer-status {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    padding: 8px 16px;
    font-size: 0.85rem;
    color: #fff;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .printer-status:hover { background: rgba(0,0,0,0.25); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #aaa; flex-shrink: 0; }
  .status-dot.online { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .status-dot.offline { background: #f87171; }

  /* Section titles */
  .section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 3px;
    background: var(--ink);
  }

  /* Card */
  .card {
    background: var(--card);
    border: 3px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 6px 6px 0 var(--ink);
  }

  /* Print jobs table */
  .jobs-header {
    display: grid;
    grid-template-columns: 1fr 100px 110px 70px 44px;
    gap: 8px;
    padding: 8px 10px;
    background: var(--ink);
    color: #fff;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .job-row {
    display: grid;
    grid-template-columns: 1fr 100px 110px 70px 44px;
    gap: 8px;
    padding: 6px 4px;
    border-bottom: 1.5px solid #e5e5e5;
    align-items: center;
  }
  .job-row:last-child { border-bottom: none; }

  input[type="text"], input[type="number"], select {
    width: 100%;
    border: 2px solid var(--border);
    padding: 7px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }
  input:focus, select:focus {
    border-color: var(--saffron);
    background: #fff;
  }
  input.error { border-color: var(--red); background: var(--red-light); }

  .btn-remove {
    width: 36px; height: 36px;
    border: 2px solid #ddd;
    background: #fff;
    color: #999;
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-remove:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

  .btn-add-row {
    margin-top: 10px;
    border: 2.5px dashed #bbb;
    background: transparent;
    padding: 10px;
    width: 100%;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }
  .btn-add-row:hover { border-color: var(--saffron); color: var(--saffron); background: #fff8f4; }

  /* Print button */
  .btn-print {
    width: 100%;
    padding: 1rem;
    background: var(--saffron);
    color: #fff;
    border: 3px solid var(--border);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--ink);
    transition: all 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1.25rem;
  }
  .btn-print:hover { background: var(--saffron-dark); transform: translate(-2px, -2px); box-shadow: 7px 7px 0 var(--ink); }
  .btn-print:active { transform: translate(3px, 3px); box-shadow: 2px 2px 0 var(--ink); }
  .btn-print:disabled { background: #ccc; cursor: not-allowed; transform: none; box-shadow: 3px 3px 0 #aaa; }

  .btn-reset {
    width: 100%;
    padding: 0.75rem;
    background: #fff;
    color: var(--ink);
    border: 3px solid var(--border);
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1rem;
    letter-spacing: 2px;
    cursor: pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: all 0.1s;
    margin-top: 0.75rem;
  }
  .btn-reset:hover { background: var(--paper); transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
  .btn-reset:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

  /* Results */
  .results { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 8px; }

  .result-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 14px;
    border: 2px solid var(--border);
    font-size: 0.9rem;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: none; } }

  .result-item.success { background: var(--green-light); border-color: var(--green); }
  .result-item.fail { background: var(--red-light); border-color: var(--red); }

  .result-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }
  .result-body { flex: 1; }
  .result-product { font-weight: 600; font-size: 0.95rem; }
  .result-detail { color: var(--muted); font-size: 0.82rem; margin-top: 3px; }
  .result-batch { font-family: monospace; background: rgba(0,0,0,0.07); padding: 1px 6px; border-radius: 3px; }

  /* Products panel */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
    margin-bottom: 1rem;
  }
  .product-chip {
    border: 2px solid var(--border);
    padding: 8px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
    background: var(--paper);
    font-size: 0.82rem;
    transition: background 0.15s;
  }
  .product-chip:hover { background: #fff; }
  .product-name { font-weight: 600; font-size: 0.85rem; }
  .product-weight { color: var(--muted); font-size: 0.78rem; }
  .chip-remove { border: none; background: none; color: #ccc; cursor: pointer; font-size: 1rem; padding: 0; line-height: 1; transition: color 0.15s; }
  .chip-remove:hover { color: var(--red); }

  .add-product-row {
    display: flex; gap: 8px; align-items: flex-start; flex-wrap: wrap;
  }
  .add-product-row input { flex: 1; min-width: 120px; }
  .btn-add-product {
    padding: 9px 18px;
    background: var(--green);
    color: #fff;
    border: 2px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    box-shadow: 3px 3px 0 var(--ink);
    transition: all 0.1s;
    white-space: nowrap;
  }
  .btn-add-product:hover { background: #155c38; transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn-add-product:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }

  .toast {
    position: fixed; bottom: 2rem; right: 2rem;
    background: var(--ink); color: #fff;
    padding: 12px 20px; font-size: 0.88rem;
    border-left: 4px solid var(--saffron);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.3);
    z-index: 100;
    animation: toastIn 0.2s ease, toastOut 0.3s ease 2.5s forwards;
    max-width: 300px;
  }
  @keyframes toastIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes toastOut { to { opacity:0; transform: translateY(10px); } }

  .spinner {
    width: 18px; height: 18px;
    border: 3px solid rgba(255,255,255,0.4);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .collapsible-toggle {
    cursor: pointer; user-select: none;
    display: flex; align-items: center; gap: 8px;
  }
  .collapsible-toggle .arrow { transition: transform 0.2s; font-size: 0.8rem; }
  .collapsible-toggle.open .arrow { transform: rotate(90deg); }
  .collapsible-body { display: none; margin-top: 1rem; }
  .collapsible-body.open { display: block; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    border: 1.5px solid;
  }
  .tag-default { border-color: #bbb; color: #888; background: #f5f5f5; }

  .uom-badge {
    display: inline-block;
    padding: 5px 8px;
    font-size: 0.78rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    border: 2px solid var(--border);
    background: var(--paper);
    color: var(--ink);
    text-align: center;
    width: 100%;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .uom-badge.kgs { background: #e8f5ee; border-color: var(--green); color: var(--green); }
  .uom-badge.gms { background: #fff8f0; border-color: var(--saffron); color: var(--saffron-dark); }
  .uom-badge.empty { background: #f5f5f5; border-color: #ddd; color: #bbb; }

  .combo-wrap { position: relative; }
  .combo-input { width: 100%; }
  .combo-dropdown {
    display: none;
    position: absolute;
    top: 100%;
    left: 0; right: 0;
    background: #fff;
    border: 2px solid var(--border);
    border-top: none;
    max-height: 180px;
    overflow-y: auto;
    z-index: 50;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.15);
  }
  .combo-dropdown.open { display: block; }
  .combo-option {
    padding: 8px 10px;
    font-size: 0.88rem;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #f0f0f0;
  }
  .combo-option:last-child { border-bottom: none; }
  .combo-option:hover, .combo-option.active { background: #fff8f0; }
  .combo-option-weight { font-size: 0.75rem; color: var(--muted); }
  .combo-new {
    padding: 8px 10px;
    font-size: 0.85rem;
    color: var(--green);
    font-weight: 600;
    cursor: pointer;
    background: var(--green-light);
    border-top: 1.5px dashed #aaa;
  }
  .combo-new:hover { background: #d4eddf; }
</style>
</head>
<body>
<!-- ── Login Screen ─────────────────────────────── -->
<div id="loginScreen" style="display:none; position:fixed; inset:0; z-index:999;
  background:var(--paper); display:flex; align-items:center; justify-content:center;
  flex-direction:column;">

  <div style="border:3px solid var(--border); background:var(--card);
    box-shadow:8px 8px 0 var(--ink); padding:2.5rem 2rem; width:100%; max-width:380px;">

    <div style="font-family:'Black Han Sans',sans-serif; font-size:1.6rem;
      color:var(--saffron); text-align:center; margin-bottom:0.25rem;
      text-shadow:2px 2px 0 rgba(0,0,0,0.1);">SRI RADHE TRADERS</div>
    <div style="text-align:center; font-size:0.75rem; letter-spacing:3px;
      text-transform:uppercase; color:var(--muted); margin-bottom:2rem;">
      Label Printing System</div>

    <div style="margin-bottom:1rem;">
      <label style="font-size:0.78rem; font-weight:600; letter-spacing:1px;
        text-transform:uppercase; display:block; margin-bottom:6px;">Username</label>
      <input type="text" id="loginUser" placeholder="Enter username"
        style="width:100%;" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>
    <div style="margin-bottom:1.5rem;">
      <label style="font-size:0.78rem; font-weight:600; letter-spacing:1px;
        text-transform:uppercase; display:block; margin-bottom:6px;">Password</label>
      <input type="password" id="loginPass" placeholder="Enter password"
        style="width:100%;" onkeydown="if(event.key==='Enter') doLogin()"/>
    </div>

    <div id="loginError" style="display:none; background:var(--red-light);
      border:2px solid var(--red); color:var(--red); padding:8px 12px;
      font-size:0.85rem; margin-bottom:1rem;"></div>

    <button onclick="doLogin()" id="loginBtn"
      style="width:100%; padding:0.9rem; background:var(--saffron); color:#fff;
      border:3px solid var(--border); font-family:'Black Han Sans',sans-serif;
      font-size:1.2rem; letter-spacing:2px; cursor:pointer;
      box-shadow:4px 4px 0 var(--ink); transition:all 0.1s;">
      LOGIN
    </button>
  </div>

  <div style="margin-top:1rem; font-size:0.75rem; color:var(--muted);">
    Session stays active for 24 hours of use
  </div>
</div>

<div id="mainApp" style="display:none;">
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="brand">
      <div class="brand-name">SRI RADHE TRADERS</div>
      <div class="brand-sub">Label Printing System · Begum Bazar, Hyderabad</div>
    </div>
    <div class="printer-status" onclick="checkStatus()" title="Click to refresh">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Checking printer...</span>
    </div>
  </header>

  <!-- Print Jobs -->
  <div class="section-title">Print Jobs</div>
  <div class="card">
    <div class="jobs-header">
      <div>Product</div>
      <div>Qty</div>
      <div>Weight (opt.)</div>
      <div>UOM</div>
      <div></div>
    </div>
    <div id="jobRows"></div>
    <button class="btn-add-row" onclick="addRow()">+ Add another item</button>

    <button class="btn-print" id="printBtn" onclick="submitPrint()">
      <span id="printBtnContent">🖨️ PRINT LABELS</span>
    </button>
    <button class="btn-reset" onclick="resetAll()">↺ RESET</button>
  </div>

  <!-- Results -->
  <div id="results" class="results"></div>

  <!-- Products (collapsible) -->
  <div class="section-title" style="margin-top:2rem;">Manage Products</div>
  <div class="card">
    <div class="collapsible-toggle" id="productsToggle" onclick="toggleProducts()">
      <span>Product → Default Weight List</span>
      <span class="arrow">▶</span>
    </div>
    <div class="collapsible-body" id="productsBody">
      <div class="products-grid" id="productsGrid"></div>
      <div class="add-product-row">
        <input type="text" id="newProduct" placeholder="Product name (e.g. MANGO)" />
        <input type="text" id="newWeight" placeholder="Weight (e.g. 1 KGS)" style="max-width:140px;" />
        <button class="btn-add-product" onclick="addProductHandler()">+ Add</button>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://ronan-gibbed-latesha.ngrok-free.dev/api';

// ── Token management ──────────────────────────────
function saveTokens(data) {
  localStorage.setItem('access_token',  data.access_token);
  localStorage.setItem('refresh_token', data.refresh_token);
}

function clearTokens() {
  localStorage.removeItem('access_token');
  localStorage.removeItem('refresh_token');
}

function getAccessToken() { return localStorage.getItem('access_token'); }
function getRefreshToken() { return localStorage.getItem('refresh_token'); }

async function refreshTokens() {
  const rt = getRefreshToken();
  if (!rt) return false;
  try {
    const res  = await fetch(`${API}/refresh`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: rt })
    });
    if (!res.ok) { clearTokens(); return false; }
    const data = await res.json();
    saveTokens(data);
    return true;
  } catch { return false; }
}

async function apiFetch(url, options = {}) {
  // Attach access token
  options.headers = options.headers || {};
  options.headers['Authorization'] = `Bearer ${getAccessToken()}`;

  let res = await fetch(url, options);

  // If 401 try refreshing token once
  if (res.status === 401) {
    const refreshed = await refreshTokens();
    if (!refreshed) { showLoginScreen(); return null; }
    options.headers['Authorization'] = `Bearer ${getAccessToken()}`;
    res = await fetch(url, options);
    if (res.status === 401) { showLoginScreen(); return null; }
  }
  return res;
}

// ── Login / Logout ────────────────────────────────
function showLoginScreen() {
  clearTokens();
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainApp').style.display     = 'none';
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').style.display  = 'none';
}

function showMainApp() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('mainApp').style.display     = 'block';
}

async function doLogin() {
  const btn  = document.getElementById('loginBtn');
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const err  = document.getElementById('loginError');

  if (!user || !pass) {
    err.textContent = 'Please enter username and password';
    err.style.display = 'block'; return;
  }

  btn.textContent = 'Logging in...';
  btn.disabled    = true;

  try {
    const res  = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: user, password: pass })
    });
    const data = await res.json();

    if (!res.ok) {
      err.textContent   = data.error || 'Login failed';
      err.style.display = 'block';
    } else {
      saveTokens(data);
      err.style.display = 'none';
      showMainApp();
      initApp();
    }
  } catch {
    err.textContent   = 'Cannot reach server. Is it running?';
    err.style.display = 'block';
  } finally {
    btn.textContent = 'LOGIN';
    btn.disabled    = false;
  }
}

// ── State ────────────────────────────────────────
let products = [];

// ── Init ─────────────────────────────────────────
function initApp() {
  addRow();
  addRow();
  checkStatus();
  loadProducts();
}

window.onload = () => {
  // Check if we have a valid refresh token
  const rt = getRefreshToken();
  if (rt) {
    // Try to refresh — if it works, go straight to app
    refreshTokens().then(ok => {
      if (ok) { showMainApp(); initApp(); }
      else    { showLoginScreen(); }
    });
  } else {
    showLoginScreen();
  }
};

// ── Printer status ────────────────────────────────
async function checkStatus() {
  const dot  = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  text.textContent = 'Checking...';
  dot.className = 'status-dot';
  try {
    const res  = await apiFetch(`${API}/status`);
    const data = await res.json();
    const online = data.status.includes('online');
    dot.className  = 'status-dot ' + (online ? 'online' : 'offline');
    text.textContent = data.status.replace(/[🟢🔴🟡]/g, '').trim();
  } catch {
    dot.className  = 'status-dot offline';
    text.textContent = 'Server not reachable';
  }
}

// ── Job rows ─────────────────────────────────────
let rowId = 0;

function getUOM(weightVal) {
  if (!weightVal && weightVal !== 0) return { label: '—', cls: 'empty' };
  const num = parseFloat(weightVal);
  if (isNaN(num)) return { label: '—', cls: 'empty' };
  return num < 100
    ? { label: 'KGS', cls: 'kgs' }
    : { label: 'GMS', cls: 'gms' };
}

function updateUOM(id) {
  const wt  = document.getElementById(`wt-${id}`)?.value.trim();
  const badge = document.getElementById(`uom-${id}`);
  if (!badge) return;
  // Extract numeric part from weight input
  const num = parseFloat(wt);
  const uom = getUOM(isNaN(num) ? null : num);
  badge.textContent  = uom.label;
  badge.className    = `uom-badge ${uom.cls}`;
}

function onProductInput(id) {
  const name  = (document.getElementById(`prod-${id}`)?.value || '').trim().toUpperCase();
  const match = products.find(p => p.name.toUpperCase() === name);
  if (match) {
    const wNum = parseFloat(match.weight);
    document.getElementById(`wt-${id}`).value = isNaN(wNum) ? '' : wNum;
    updateUOM(id);
  } else {
    document.getElementById(`wt-${id}`).value = '';
    const badge = document.getElementById(`uom-${id}`);
    if (badge) { badge.textContent = '—'; badge.className = 'uom-badge empty'; }
  }
}

function addRow(product='', qty='', weight='') {
  rowId++;
  const id  = rowId;
  const div = document.createElement('div');
  div.className = 'job-row';
  div.id = `row-${id}`;

  const listId = `products-list-${id}`;
  const initUOM = weight ? getUOM(parseFloat(weight)) : { label: '—', cls: 'empty' };

  div.innerHTML = `
    <div class="combo-wrap">
      <input type="text" id="prod-${id}" class="combo-input" placeholder="e.g. PHALLI" value="${product}"
        oninput="onComboInput(${id})"
        onfocus="openCombo(${id})"
        onblur="onComboBlur(${id})"
        autocomplete="off"
        style="text-transform:uppercase;"/>
      <div class="combo-dropdown" id="combo-dd-${id}"></div>
    </div>
    <div>
      <input type="number" id="qty-${id}" placeholder="Qty" min="1" max="500" value="${qty}"
        onchange="onQtyChange(${id})"/>
    </div>
    <div>
      <input type="text" id="wt-${id}" placeholder="e.g. 2 or 2 KGS" value="${weight}"
        oninput="updateUOM(${id})"/>
    </div>
    <div>
      <div class="uom-badge ${initUOM.cls}" id="uom-${id}">${initUOM.label}</div>
    </div>
    <div>
      <button class="btn-remove" onclick="removeRow(${id})" title="Remove">×</button>
    </div>
  `;
  document.getElementById('jobRows').appendChild(div);
  renderCombo(id, '');
}

function renderCombo(id, filter) {
  const dd      = document.getElementById(`combo-dd-${id}`);
  const val     = (document.getElementById(`prod-${id}`)?.value || '').toUpperCase().trim();
  const filtered = products.filter(p => p.name.toUpperCase().includes(filter.toUpperCase()));
  const exactMatch = products.some(p => p.name.toUpperCase() === val);

  let html = filtered.map(p => `
    <div class="combo-option" onmousedown="selectComboOption(${id}, '${p.name}', ${parseFloat(p.weight) || ''})"
      title="${p.name}">
      <span>${p.name}</span>
      <span class="combo-option-weight">${p.weight}</span>
    </div>
  `).join('');

  // Show "add new" option if typed value is not empty and not in list
  if (val && !exactMatch) {
    html += `<div class="combo-new" onmousedown="onComboNewItem(${id})">+ Add "${val}" to product list</div>`;
  }

  dd.innerHTML = html || '<div class="combo-option" style="color:#aaa;cursor:default;">No products found</div>';
}

function openCombo(id) {
  const dd  = document.getElementById(`combo-dd-${id}`);
  const val = (document.getElementById(`prod-${id}`)?.value || '').toUpperCase();
  renderCombo(id, val);
  dd.classList.add('open');
}

function onComboBlur(id) {
  // Delay to allow mousedown on option to fire first
  setTimeout(() => {
    const dd = document.getElementById(`combo-dd-${id}`);
    if (dd) dd.classList.remove('open');
  }, 200);
}

function onComboInput(id) {
  const input = document.getElementById(`prod-${id}`);
  input.value = input.value.toUpperCase();
  const val   = input.value.trim().toUpperCase();
  renderCombo(id, val);
  document.getElementById(`combo-dd-${id}`).classList.add('open');
  onProductInput(id);
}

function selectComboOption(id, name, weightNum) {
  document.getElementById(`prod-${id}`).value = name;
  if (weightNum) {
    document.getElementById(`wt-${id}`).value = weightNum;
    updateUOM(id);
  }
  document.getElementById(`combo-dd-${id}`).classList.remove('open');
}

async function onComboNewItem(id) {
  const name = (document.getElementById(`prod-${id}`)?.value || '').trim().toUpperCase();
  const qty  = document.getElementById(`qty-${id}`)?.value.trim();

  if (!name) return;

  // Only add if quantity is also filled
  if (!qty || isNaN(qty) || qty < 1) {
    showToast('Fill in quantity first, then the product will be added');
    return;
  }

  // Use weight entered by user, fallback to 500 GMS if empty
  const wtRaw = (document.getElementById(`wt-${id}`)?.value || '').trim();
  const wtNum = parseFloat(wtRaw);
  let weight;
  if (wtRaw && !isNaN(wtNum)) {
    weight = wtNum < 100 ? `${wtNum} KGS` : `${wtNum} GMS`;
  } else if (wtRaw.toUpperCase().includes('KG') || wtRaw.toUpperCase().includes('GM')) {
    weight = wtRaw.toUpperCase();
  } else {
    weight = '500 GMS';
  }

  try {
    await apiFetch(`${API}/products/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product: name, weight })
    });
    await loadProducts();
    document.getElementById(`combo-dd-${id}`).classList.remove('open');
    showToast(`✅ Added "${name}" → ${weight}`);
  } catch {
    showToast('Failed to add product');
  }
}

function onQtyChange(id) {
  // If product is not in list and qty is now filled, nothing extra needed
  // (user will click "add" option in dropdown if they want)
}

function removeRow(id) {
  const el = document.getElementById(`row-${id}`);
  if (el) {
    // Keep at least 1 row
    const rows = document.querySelectorAll('.job-row');
    if (rows.length <= 1) return;
    el.remove();
  }
}

// ── Print ────────────────────────────────────────
async function submitPrint() {
  const btn     = document.getElementById('printBtn');
  const content = document.getElementById('printBtnContent');
  const rows    = document.querySelectorAll('.job-row');

  // Build job lines
  const jobs = [];
  let hasError = false;

  rows.forEach(row => {
    const id   = row.id.replace('row-', '');
    const prod = document.getElementById(`prod-${id}`)?.value.trim().toUpperCase();
    const qty  = document.getElementById(`qty-${id}`)?.value.trim();
    const wt   = document.getElementById(`wt-${id}`)?.value.trim();

    // Reset error state
    document.getElementById(`prod-${id}`).classList.remove('error');
    document.getElementById(`qty-${id}`).classList.remove('error');

    if (!prod && !qty) return; // skip empty rows

    if (!prod) { document.getElementById(`prod-${id}`).classList.add('error'); hasError = true; return; }
    if (!qty || isNaN(qty) || qty < 1) { document.getElementById(`qty-${id}`).classList.add('error'); hasError = true; return; }

    let line = `${prod},${qty}`;
    if (wt) line += `,${wt}`;
    jobs.push({ line });
  });

  if (hasError) { showToast('Please fix highlighted fields'); return; }
  if (jobs.length === 0) { showToast('Add at least one item'); return; }

  // Show loading
  btn.disabled = true;
  content.innerHTML = '<div class="spinner"></div>';

  try {
    const res  = await apiFetch(`${API}/print`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ jobs })
    });
    const data = await res.json();
    showResults(data.results);
    // Auto reset rows after successful print
    document.getElementById('jobRows').innerHTML = '';
    rowId = 0;
    addRow();
    addRow();
  } catch (e) {
    showToast('❌ Cannot reach server. Is it running?');
  } finally {
    btn.disabled = false;
    content.innerHTML = '🖨️ PRINT LABELS';
  }
}

function showResults(results) {
  const container = document.getElementById('results');
  container.innerHTML = '';

  results.forEach(r => {
    const div = document.createElement('div');
    div.className = `result-item ${r.success ? 'success' : 'fail'}`;

    if (r.success) {
      div.innerHTML = `
        <div class="result-icon">✅</div>
        <div class="result-body">
          <div class="result-product">${r.product} — ${r.quantity} sticker(s)</div>
          <div class="result-detail">
            ${r.weight} &nbsp;·&nbsp;
            Packed: ${r.packed_on} &nbsp;·&nbsp;
            Best Before: ${r.best_before} &nbsp;·&nbsp;
            Batch: <span class="result-batch">${r.batch_no}</span>
          </div>
        </div>
      `;
    } else {
      div.innerHTML = `
        <div class="result-icon">❌</div>
        <div class="result-body">
          <div class="result-product">${r.line}</div>
          <div class="result-detail" style="color:#c0392b;">${r.error || 'Print failed'}</div>
        </div>
      `;
    }
    container.appendChild(div);
  });

  if (results.length > 0) {
    container.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── Products ─────────────────────────────────────
async function loadProducts() {
  try {
    const res  = await apiFetch(`${API}/products`);
    const data = await res.json();
    products = data.products;
    renderProducts();
  } catch {}
}

function renderProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = products.map(p => `
    <div class="product-chip">
      <div>
        <div class="product-name">${p.name}</div>
        <div class="product-weight">${p.weight}</div>
      </div>
      <button class="chip-remove" onclick="removeProductHandler('${p.name}')" title="Remove">×</button>
    </div>
  `).join('');

  // Refresh datalists in all rows
  document.querySelectorAll('[id^="products-list-"]').forEach(dl => {
    dl.innerHTML = products.map(p => `<option value="${p.name}">`).join('');
  });
}

async function addProductHandler() {
  const name   = document.getElementById('newProduct').value.trim().toUpperCase();
  const weight = document.getElementById('newWeight').value.trim().toUpperCase();
  if (!name || !weight) { showToast('Enter both product name and weight'); return; }

  try {
    await apiFetch(`${API}/products/add`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product: name, weight })
    });
    document.getElementById('newProduct').value = '';
    document.getElementById('newWeight').value  = '';
    await loadProducts();
    showToast(`✅ Added ${name}`);
  } catch { showToast('Failed to add product'); }
}

async function removeProductHandler(name) {
  if (!confirm(`Remove ${name} from product list?`)) return;
  try {
    await apiFetch(`${API}/products/remove`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ product: name })
    });
    await loadProducts();
    showToast(`Removed ${name}`);
  } catch { showToast('Failed to remove product'); }
}

function toggleProducts() {
  const toggle = document.getElementById('productsToggle');
  const body   = document.getElementById('productsBody');
  toggle.classList.toggle('open');
  body.classList.toggle('open');
  if (body.classList.contains('open')) loadProducts();
}

// ── Reset ────────────────────────────────────────
function resetAll() {
  // Clear all job rows and add 2 fresh ones
  document.getElementById('jobRows').innerHTML = '';
  document.getElementById('results').innerHTML = '';
  rowId = 0;
  addRow();
  addRow();
  showToast('Cleared');
}

// ── Toast ─────────────────────────────────────────
function showToast(msg) {
  const existing = document.querySelector('.toast');
  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}
</script>
